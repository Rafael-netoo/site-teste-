<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Primeiro GitHub Pages</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      background: rgba(255,255,255,0.08);
      padding:40px;
      border-radius:20px;
      text-align:center;
      max-width:500px;
      width:100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1{
      font-size:2.5rem;
      margin-bottom:15px;
    }

    p{
      font-size:1.1rem;
      margin-bottom:25px;
      color:#dbeafe;
    }

    button{
      background:#3b82f6;
      border:none;
      padding:12px 24px;
      border-radius:10px;
      color:white;
      font-size:1rem;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#2563eb;
      transform:scale(1.05);
    }

    footer{
      margin-top:25px;
      font-size:0.9rem;
      color:#cbd5e1;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 GitHub Pages</h1>

    <p>
      Seu site está funcionando com sucesso!
    </p>

    <button onclick="mostrarMensagem()">
      Clique aqui
    </button>

    <footer>
      Feito por José Neto
    </footer>
  </div>

  <script>
    function mostrarMensagem(){
      alert("Seu GitHub Pages está funcionando!");
    }
  </script>

</body>
</html>
